# Revio AI — FREE deploy: web (site + API + admin) + Redis.
# The Celery worker/beat services (autonomous scheduled agents) are omitted —
# they're paid on Render. Add them later; everything else works without them
# (agents can still be triggered manually from /admin).

services:
  - type: redis
    name: revio-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: revio-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "true"                # exposes /docs for testing; set false later
      - key: AUTO_SEND_ENABLED
        value: "false"               # compliance: no auto-send
      - key: LLM_PROVIDER
        value: openai
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: WHOP_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        fromService: { type: redis, name: revio-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: revio-redis, property: connectionString }
      - key: CELERY_RESULT_BACKEND
        fromService: { type: redis, name: revio-redis, property: connectionString }
